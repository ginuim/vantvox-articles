name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Generate index
        run: |
          chmod +x scripts/generate-index.sh
          bash scripts/generate-index.sh
          cp docs/index.html index.html

      - name: Push to gh-pages
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Fetch gh-pages
          git fetch origin gh-pages:gh-pages-local
          git checkout gh-pages-local
          
          # Copy main content
          cp ../main/* . 2>/dev/null || true
          cp -r ../main/.* . 2>/dev/null || true
          
          # Commit and push
          git add .
          git commit -m "Auto: update index" || exit 0
          git push origin gh-pages-local:gh-pages --force
