<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VANTVOX Bio 栏目</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            max-width: 800px; margin: 0 auto; padding: 20px; 
            line-height: 1.7; background: #f5f5f5;
        }
        header { 
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); 
            color: white; padding: 40px 30px; border-radius: 12px; margin-bottom: 30px;
        }
        h1 { margin: 0 0 10px 0; font-size: 28px; }
        .subtitle { color: #a0a0a0; font-size: 14px; }
        .article-list { list-style: none; padding: 0; }
        .article-item { 
            background: white; margin-bottom: 15px; padding: 20px; 
            border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .article-item:hover { 
            transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,0.12); 
        }
        .article-item a { 
            color: #333; text-decoration: none; font-size: 18px; font-weight: 600;
        }
        .article-item .meta { 
            color: #888; font-size: 12px; margin-top: 8px; 
        }
        #article-viewer { 
            display: none; background: white; padding: 30px; 
            border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        }
        #article-viewer h1 { color: #1a1a2e; border-bottom: 2px solid #eee; padding-bottom: 15px; }
        #article-viewer h2 { color: #16213e; margin-top: 30px; }
        #article-viewer p { margin: 16px 0; }
        #article-viewer blockquote { 
            border-left: 4px solid #ddd; margin: 20px 0; padding: 10px 20px; 
            background: #f9f9f9; color: #555;
        }
        #article-viewer table { 
            border-collapse: collapse; width: 100%; margin: 20px 0; 
        }
        #article-viewer th, #article-viewer td { 
            border: 1px solid #ddd; padding: 10px; text-align: left; 
        }
        #article-viewer th { background: #f5f5f5; }
        #article-viewer a { color: #0066cc; }
        #article-viewer code { 
            background: #f0f0f0; padding: 2px 6px; border-radius: 3px; font-size: 14px;
        }
        #article-viewer pre { 
            background: #1a1a2e; color: #eee; padding: 15px; border-radius: 8px; overflow-x: auto;
        }
        #article-viewer pre code { background: none; padding: 0; }
        .back-btn { 
            display: inline-block; margin-bottom: 20px; color: #666; 
            text-decoration: none; cursor: pointer;
        }
        .back-btn:hover { color: #333; }
    </style>
</head>
<body>
    <header>
        <h1>VANTVOX Bio</h1>
        <div class="subtitle">文明人物的传记故事</div>
    </header>

    <ul class="article-list" id="article-list">
        <li class="article-item">
            <a href="#" onclick="loadArticle('bio/da-yu.md'); return false;">大禹：治理洪水的人</a>
            <div class="meta">约前2200年 · 上古时期</div>
        </li>
    </ul>

    <div id="article-viewer">
        <a class="back-btn" onclick="showList()">← 返回列表</a>
        <div id="content"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        const articles = [
            { file: 'bio/da-yu.md', title: '大禹：治理洪水的人', period: '约前2200年', category: '上古时期' }
        ];

        function showList() {
            document.getElementById('article-list').style.display = 'block';
            document.getElementById('article-viewer').style.display = 'none';
        }

        function loadArticle(path) {
            fetch(path)
                .then(res => res.text())
                .then(markdown => {
                    document.getElementById('content').innerHTML = marked.parse(markdown);
                    document.getElementById('article-list').style.display = 'none';
                    document.getElementById('article-viewer').style.display = 'block';
                    window.scrollTo(0, 0);
                });
        }

        // 动态生成文章列表
        const listEl = document.getElementById('article-list');
        listEl.innerHTML = articles.map(a => `
            <li class="article-item">
                <a href="#" onclick="loadArticle('${a.file}'); return false;">${a.title}</a>
                <div class="meta">${a.period} · ${a.category}</div>
            </li>
        `).join('');
    </script>
</body>
</html>
